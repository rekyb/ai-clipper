services:
  mongodb:
    image: mongo:7.0
    container_name: ai-clipper-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_clipper
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
